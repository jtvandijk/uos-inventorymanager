{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm p-4">

                <!-- Title -->
                <h2 class="text-center mb-4">Add Item</h2>

                <!-- Code preview -->
                <div id="code-preview" class="alert alert-info text-center fw-bold">
                    Select a category to generate inventory ID
                </div>

                <!-- Form -->
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_category" class="form-label">Category</label>
                        {{ form.category }}
                    </div>

                    <div class="mb-3">
                        <label for="id_gender" class="form-label">Gender</label>
                        {{ form.gender }}
                    </div>

                    <div class="mb-3">
                        <label for="id_size" class="form-label">Size</label>
                        {{ form.size }}
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Save Item
                    </button>
                </form>

                <!-- Back -->
                <div class="text-center mt-3">
                    <a href="{% url 'inventory' %}" class="btn btn-outline-secondary">
                        Back
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const categoryField = document.querySelector("select[name='category']");
    const sizeField = document.querySelector("select[name='size']");
    const preview = document.getElementById("code-preview");

    if (!categoryField || !sizeField) return;

    // Update size options
    function updateSizes(categoryId) {
        fetch(`/inventory/get-sizes/?category_id=${categoryId}`)
            .then(res => res.json())
            .then(data => {

                sizeField.innerHTML = "";

                const defaultOption = document.createElement("option");
                defaultOption.value = "";
                defaultOption.textContent = "---------";
                sizeField.appendChild(defaultOption);

                data.sizes.forEach(size => {
                    const option = document.createElement("option");
                    option.value = size.value;
                    option.textContent = size.label;
                    sizeField.appendChild(option);
                });
            });
    }

    // Update code preview
    function updateCodePreview(categoryId) {
        fetch(`/inventory/get-next-code/?category_id=${categoryId}`)
            .then(res => res.json())
            .then(data => {
                if (data.code) {
                    preview.textContent = "New Item Code: " + data.code;
                }
            });
    }

    // On category change
    categoryField.addEventListener("change", function () {

        const categoryId = categoryField.value;

        if (!categoryId) {
            preview.textContent = "Select a category to generate inventory ID";
            return;
        }

        updateSizes(categoryId);
        updateCodePreview(categoryId);
    });

});
</script>

</body>
</html>
