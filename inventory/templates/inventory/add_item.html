{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm p-4">

                <h5 class="mb-4">Add Item</h5>

                <!-- Code preview -->
                <div class="mb-4 pb-3 border-bottom text-center">
                    <div class="text-muted small mb-1">Next inventory ID</div>
                    <div id="code-preview" class="text-muted fst-italic">select a category</div>
                </div>

                <!-- Form -->
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_category" class="form-label">Category</label>
                        {{ form.category }}
                    </div>

                    <div class="mb-3">
                        <label for="id_gender" class="form-label">Gender</label>
                        {{ form.gender }}
                    </div>

                    <div class="mb-3">
                        <label for="id_size" class="form-label">Size</label>
                        {{ form.size }}
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2">
                        Save Item
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'inventory' %}" class="btn btn-outline-secondary">
                        Back
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const categoryField = document.querySelector("select[name='category']");
    const sizeField = document.querySelector("select[name='size']");
    const preview = document.getElementById("code-preview");

    if (!categoryField || !sizeField) return;

    function updateSizes(categoryId) {
        fetch(`/inventory/get-sizes/?category_id=${categoryId}`)
            .then(res => res.json())
            .then(data => {
                sizeField.innerHTML = "";

                const defaultOption = document.createElement("option");
                defaultOption.value = "";
                defaultOption.textContent = "---------";
                sizeField.appendChild(defaultOption);

                data.sizes.forEach(size => {
                    const option = document.createElement("option");
                    option.value = size.value;
                    option.textContent = size.label;
                    sizeField.appendChild(option);
                });
            });
    }

    function updateCodePreview(categoryId) {
        fetch(`/inventory/get-next-code/?category_id=${categoryId}`)
            .then(res => res.json())
            .then(data => {
                if (data.code) {
                    preview.textContent = data.code;
                    preview.className = "fw-bold font-monospace fs-4";
                }
            });
    }

    categoryField.addEventListener("change", function () {
        const categoryId = categoryField.value;

        if (!categoryId) {
            preview.textContent = "select a category";
            preview.className = "text-muted fst-italic";
            return;
        }

        updateSizes(categoryId);
        updateCodePreview(categoryId);
    });

});
</script>

</body>
</html>
