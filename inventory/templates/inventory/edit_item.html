{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Item</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm p-4">

                <div class="mb-4">
                    <h5 class="mb-0">Edit Item</h5>
                    <p class="font-monospace text-muted mb-0">{{ item.code }}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="next" value="{{ next }}">

                    <div class="mb-3">
                        <label for="id_category" class="form-label">Category</label>
                        {{ form.category }}
                    </div>

                    <div class="mb-3">
                        <label for="id_gender" class="form-label">Gender</label>
                        {{ form.gender }}
                    </div>

                    <div class="mb-4">
                        <label for="id_size" class="form-label">Size</label>
                        {{ form.size }}
                    </div>

                    <button type="submit" class="btn btn-success w-100">Save Changes</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'view_item' item.id %}?next={{ next }}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const categoryField = document.querySelector("select[name='category']");
    const sizeField = document.querySelector("select[name='size']");
    const currentSize = "{{ item.size|escapejs }}";

    if (!categoryField || !sizeField) return;

    function updateSizes(categoryId, preselectValue) {
        fetch(`/inventory/get-sizes/?category_id=${categoryId}`)
            .then(res => res.json())
            .then(data => {
                sizeField.innerHTML = "";

                const defaultOption = document.createElement("option");
                defaultOption.value = "";
                defaultOption.textContent = "---------";
                sizeField.appendChild(defaultOption);

                data.sizes.forEach(size => {
                    const option = document.createElement("option");
                    option.value = size.value;
                    option.textContent = size.label;
                    if (size.value === preselectValue) {
                        option.selected = true;
                    }
                    sizeField.appendChild(option);
                });
            });
    }

    // Pre-populate sizes for the current category and pre-select current size
    if (categoryField.value) {
        updateSizes(categoryField.value, currentSize);
    }

    // Repopulate (no pre-selection) when category changes
    categoryField.addEventListener("change", function () {
        if (categoryField.value) updateSizes(categoryField.value, "");
    });

});
</script>

</body>
</html>
