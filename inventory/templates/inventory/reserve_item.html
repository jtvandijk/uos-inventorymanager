{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Reserve Item</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container-fluid py-4 px-3 px-md-5">

    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">

            <div class="card shadow-sm p-4">

                <!-- Title -->
                <h2 class="text-center mb-3">Reserve Item</h2>

                <!-- Item summary -->
                <p class="text-center text-muted mb-4">
                    {{ item.code }} • {{ item.category.name }}
                    {% if item.size and item.size != "N/A" %}
                        • {{ item.size }}
                    {% endif %}
                </p>

                <!-- Form -->
                <form method="post">
                    {% csrf_token %}

                    <input type="hidden" name="next" value="{{ next }}">
                    
                    <div class="mb-3">
                        <label for="id_person" class="form-label">Reserved for</label>
                        {{ form.person }}
                    </div>

                    <div class="mb-3">
                        <label for="id_reserved_for_date" class="form-label">Collection date</label>
                        {{ form.reserved_for_date }}
                    </div>

                    <div class="mb-3">
                        <label for="id_notes" class="form-label">Notes</label>
                        {{ form.notes }}
                    </div>

                    <button type="submit" class="btn btn-success w-100">
                        Confirm Reservation
                    </button>
                </form>

                <!-- Back -->
                <div class="text-center mt-3">
                    <a href="{% url 'inventory' %}" class="btn btn-outline-secondary">
                        Back
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
