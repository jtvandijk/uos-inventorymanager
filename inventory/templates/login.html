{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login - Under One Sky</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .login-card {
            border-radius: 16px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="col-md-4">

        <div class="card shadow-sm p-4 login-card">

            <!-- Header -->
            <div class="text-center mb-4">
                <img src="{% static 'logo.png' %}" alt="UOS Logo" style="max-height: 60px;" class="mb-2">
                <h4 class="fw-semibold mb-0">UOS Inventory Manager</h4>
            </div>

            <!-- Form -->
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-3">
                    <label for="id_password" class="form-label">Password</label>
                    {{ form.password }}
                </div>

                {% if form.errors %}
                <div class="alert alert-danger py-2">
                    Invalid username or password
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100 mt-2">
                    Log in
                </button>
            </form>
        </div>
        <div class="text-center mt-4 mb-5">
            <span class="badge bg-dark px-3 py-2 shadow-sm" 
                style="font-size: 0.9rem; border-radius: 8px; opacity: 0.85;">
                Beta
            </span>
        </div>
    </div>
</div>

</body>
</html>
